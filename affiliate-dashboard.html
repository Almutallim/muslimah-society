<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Mon Programme Affiliation — Muslimah Society</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--rose:#E8D7DF;--mauve:#C8B6D8;--beige:#F5EFE8;--cream:#FCFAF8;--gold:#C6A86B;--text:#2C2C2C;--shadow: 0 18px 45px rgba(0,0,0,.08);--shadow2: 0 10px 30px rgba(0,0,0,.06);--radius: 26px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:var(--cream);color:var(--text);line-height:1.7;padding-top:90px}
h1,h2,h3{font-family:'Playfair Display',serif}
.navbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:18px 28px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(200,182,216,.35);z-index:999}
.logo{font-family:'Playfair Display',serif;font-size:22px;letter-spacing:.2px;color:var(--gold);display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-badge{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #fff, var(--beige));border:1px solid rgba(198,168,107,.35);box-shadow:0 8px 20px rgba(0,0,0,.06);position:relative}
.logo-badge::after{content:"";position:absolute;inset:8px;border-radius:50%;border:1px dashed rgba(198,168,107,.55)}
.container{max-width:1100px;margin:0 auto;padding:40px 20px}
.header{text-align:center;margin-bottom:40px}
.header h1{font-size:clamp(32px, 4vw, 48px);color:var(--gold);margin-bottom:12px}
.card{background:rgba(255,255,255,.90);border:2px solid rgba(200,182,216,.30);border-radius:var(--radius);padding:30px;margin-bottom:25px;box-shadow:var(--shadow2)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
.stat-card{padding:25px;background:var(--beige);border-radius:16px;text-align:center}
.stat-value{font-size:42px;color:var(--gold);font-weight:700;margin-bottom:8px}
.stat-label{font-size:13px;color:rgba(44,44,44,.65);text-transform:uppercase;letter-spacing:1px}
.referral-code{background:var(--mauve);color:#fff;padding:20px;border-radius:16px;text-align:center;margin:20px 0}
.referral-code h3{color:#fff;margin-bottom:12px}
.code-display{font-size:32px;font-weight:700;letter-spacing:2px;margin:15px 0}
.copy-btn{background:#fff;color:var(--mauve);border:none;padding:12px 28px;border-radius:999px;font-weight:600;cursor:pointer;margin-top:10px}
.rewards{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.reward-card{padding:25px;background:linear-gradient(135deg,var(--rose),var(--mauve));color:#fff;border-radius:20px;text-align:center}
.reward-card h3{margin-bottom:10px}
.reward-badge{font-size:48px;margin:15px 0}
.locked{opacity:.5;filter:grayscale(1)}
</style>
</head>
<body>
<header class="navbar">
<a class="logo" href="index.html"><span class="logo-badge"></span>Muslimah Society</a>
</header>
<div class="container">
<div class="header">
<h1>Programme de Parrainage</h1>
<p>Invite tes sœurs et gagne des récompenses</p>
</div>
<div id="affiliateContent" class="card">
<p>Chargement...</p>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/auth.js"></script>
<script>
async function loadAffiliate(){
try{
const {data:{session}}=await supabaseClient.auth.getSession();
if(!session){window.location.href='login.html';return}
const {data:profile}=await supabaseClient.from('profiles').select('*').eq('id',session.user.id).single();
const referralCode=profile.referral_code||'';
const {data:referrals}=await supabaseClient.from('referrals').select('*').eq('referrer_id',session.user.id);
const total=referrals?.length||0;
const completed=referrals?.filter(r=>r.status==='completed').length||0;
document.getElementById('affiliateContent').innerHTML=`
<div class="stats-grid">
<div class="stat-card">
<div class="stat-value">${total}</div>
<div class="stat-label">Parrainages</div>
</div>
<div class="stat-card">
<div class="stat-value">${completed}</div>
<div class="stat-label">Confirmés</div>
</div>
</div>
<div class="referral-code">
<h3>Ton Code de Parrainage</h3>
<div class="code-display">${referralCode}</div>
<button class="copy-btn" onclick="copyCode('${referralCode}')">Copier le code</button>
</div>
<h3 style="color:var(--gold);margin:30px 0 20px">Récompenses</h3>
<div class="rewards">
<div class="reward-card ${completed>=3?'':'locked'}">
<div class="reward-badge">🎁</div>
<h3>3 parrainages</h3>
<p>1 mois à -50%</p>
<p style="margin-top:10px;font-size:13px">${completed>=3?'✅ Débloqué':'🔒 Verrouillé'}</p>
</div>
<div class="reward-card ${completed>=5?'':'locked'}">
<div class="reward-badge">✨</div>
<h3>5 parrainages</h3>
<p>1 mois GRATUIT</p>
<p style="margin-top:10px;font-size:13px">${completed>=5?'✅ Débloqué':'🔒 Verrouillé'}</p>
</div>
<div class="reward-card ${completed>=10?'':'locked'}">
<div class="reward-badge">👑</div>
<h3>10 parrainages</h3>
<p>3 mois GRATUITS</p>
<p style="margin-top:10px;font-size:13px">${completed>=10?'✅ Débloqué':'🔒 Verrouillé'}</p>
</div>
</div>
`;
}catch(e){console.error(e)}
}
function copyCode(code){
navigator.clipboard.writeText(code);
alert('Code copié !');
}
loadAffiliate();
</script>
</body>
</html>
