<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Lecteur Qur'an — Muslimah Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Amiri:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
:root{
      --rose:#E8D7DF;
      --mauve:#C8B6D8;
      --beige:#F5EFE8;
      --cream:#FCFAF8;
      --gold:#C6A86B;
      --text:#2C2C2C;
      --shadow: 0 18px 45px rgba(0,0,0,.08);
      --shadow2: 0 10px 30px rgba(0,0,0,.06);
      --radius: 26px;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Montserrat',sans-serif;
      background:var(--cream);
      color:var(--text);
      line-height:1.7;
      padding-top:90px;
    }
    h1,h2,h3{font-family:'Playfair Display',serif}
    
    .navbar{
      position:fixed; top:0; left:0; right:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 28px;
      background:rgba(255,255,255,.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(200,182,216,.35);
      z-index:999;
      box-shadow:0 2px 10px rgba(0,0,0,.05);
    }
    .logo{
      font-family:'Playfair Display',serif;
      font-size:22px;
      letter-spacing:.2px;
      color:var(--gold);
      display:flex; align-items:center; gap:10px;
      text-decoration:none;
    }
    .logo-badge{
      width:34px;height:34px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff, var(--beige));
      border: 1px solid rgba(198,168,107,.35);
      box-shadow: 0 8px 20px rgba(0,0,0,.06);
      position:relative;
    }
    .logo-badge::after{
      content:"";
      position:absolute; inset:8px;
      border-radius:50%;
      border: 1px dashed rgba(198,168,107,.55);
      opacity:.9;
    }

    .container{
      max-width:1200px;
      margin:0 auto;
      padding:20px;
    }

    .player-header{
      background: linear-gradient(135deg, var(--rose), var(--mauve));
      padding:40px 30px;
      border-radius:var(--radius);
      margin-bottom:30px;
      text-align:center;
      box-shadow:var(--shadow);
    }
    .player-header h1{
      font-size:clamp(28px, 4vw, 42px);
      color:#fff;
      margin-bottom:12px;
    }
    .player-header p{
      color:rgba(255,255,255,.90);
      font-size:16px;
    }

    .controls{
      background:rgba(255,255,255,.92);
      border:2px solid rgba(200,182,216,.30);
      border-radius:var(--radius);
      padding:25px;
      margin-bottom:25px;
      box-shadow:var(--shadow2);
    }
    .controls-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
      gap:20px;
      margin-bottom:20px;
    }
    .control-group{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .control-group label{
      font-size:13px;
      font-weight:600;
      color:var(--gold);
      text-transform:uppercase;
      letter-spacing:.5px;
    }
    select{
      padding:12px;
      border-radius:12px;
      border:2px solid rgba(200,182,216,.30);
      background:rgba(255,255,255,.90);
      font-size:15px;
      cursor:pointer;
      transition:.3s;
      font-family:'Montserrat',sans-serif;
    }
    select:focus{
      outline:none;
      border-color:var(--mauve);
      box-shadow: 0 0 0 4px rgba(200,182,216,.15);
    }

    .audio-controls{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:15px;
      padding-top:20px;
      border-top:2px solid var(--beige);
    }
    .btn-player{
      width:60px;
      height:60px;
      border-radius:50%;
      border:none;
      background:var(--mauve);
      color:#fff;
      font-size:24px;
      cursor:pointer;
      transition:.3s;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow2);
    }
    .btn-player:hover{
      transform:scale(1.1);
      box-shadow:var(--shadow);
    }
    .btn-player.play{
      width:70px;
      height:70px;
      background:var(--gold);
      font-size:28px;
    }
    .btn-player:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    .verse-container{
      background:rgba(255,255,255,.95);
      border:2px solid rgba(200,182,216,.30);
      border-radius:var(--radius);
      padding:40px 30px;
      margin-bottom:25px;
      box-shadow:var(--shadow);
      min-height:400px;
    }
    .verse-header{
      text-align:center;
      padding-bottom:25px;
      border-bottom:2px solid var(--beige);
      margin-bottom:30px;
    }
    .verse-header h2{
      font-size:28px;
      color:var(--gold);
      margin-bottom:8px;
    }
    .verse-header .ayah-number{
      font-size:16px;
      color:rgba(44,44,44,.65);
      font-weight:600;
    }

    .bismillah{
      font-family:'Amiri', serif;
      font-size:clamp(20px, 3vw, 28px);
      text-align:center;
      color:var(--gold);
      margin-bottom:20px;
      direction:rtl;
    }

    .verse-arabic{
      font-family:'Amiri', serif;
      font-size:clamp(28px, 4vw, 36px);
      line-height:2;
      text-align:center;
      color:var(--text);
      margin-bottom:30px;
      padding:20px;
      background:var(--beige);
      border-radius:20px;
      direction:rtl;
    }
    .verse-arabic.playing{
      background: linear-gradient(135deg, rgba(232,215,223,.60), rgba(200,182,216,.40));
      border:2px solid var(--gold);
    }

    .verse-translation{
      font-size:18px;
      line-height:1.8;
      color:rgba(44,44,44,.80);
      text-align:center;
      padding:20px;
    }

    .verse-nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding-top:20px;
      border-top:2px solid var(--beige);
    }
    .btn-nav{
      padding:12px 24px;
      border-radius:999px;
      border:2px solid var(--mauve);
      background:rgba(255,255,255,.90);
      color:var(--mauve);
      font-weight:600;
      cursor:pointer;
      transition:.3s;
      font-family:'Montserrat',sans-serif;
      font-size:14px;
      text-transform:uppercase;
      letter-spacing:.5px;
    }
    .btn-nav:hover{
      background:var(--mauve);
      color:#fff;
      transform:translateY(-2px);
    }
    .btn-nav:disabled{
      opacity:.4;
      cursor:not-allowed;
    }

    .loading{
      text-align:center;
      padding:60px 20px;
      color:var(--mauve);
      font-size:18px;
    }
    .spinner{
      border:4px solid var(--beige);
      border-top:4px solid var(--mauve);
      border-radius:50%;
      width:50px;
      height:50px;
      animation:spin 1s linear infinite;
      margin:0 auto 20px;
    }
    @keyframes spin{
      0%{transform:rotate(0deg)}
      100%{transform:rotate(360deg)}
    }

    @media (max-width:768px){
      .controls-grid{
        grid-template-columns:1fr;
      }
      .verse-arabic{
        font-size:24px;
      }
      .verse-translation{
        font-size:16px;
      }
    }
  </style>
</head>
<body>

<header class="navbar">
    <a class="logo" href="index.html"><span class="logo-badge"></span>Muslimah Society</a>
  </header>

  <div class="container">
    
    <div class="player-header">
      <h1>📖 Lecteur Qur'an</h1>
      <p>Lis et écoute le Qur'an avec traduction Nour International</p>
    </div>

    <div class="controls">
      <div class="controls-grid">
        
        <div class="control-group">
          <label>Sourate</label>
          <select id="surahSelect">
            <option value="">Chargement...</option>
          </select>
        </div>

        <div class="control-group">
          <label>Récitateur</label>
          <select id="reciterSelect">
            <option value="ar.abdulbasitmurattal">Abdul Basit (Murattal)</option>
            <option value="ar.husary">Al-Hussary</option>
            <option value="ar.minshawi">Al-Minshawi</option>
            <option value="ar.shaatree">Abu Bakr Al-Shatri</option>
          </select>
        </div>

        <div class="control-group">
          <label>Traduction</label>
          <select id="translationSelect">
            <option value="en.sahih">Nour International (English)</option>
          </select>
        </div>

      </div>

      <div class="audio-controls">
        <button class="btn-player" id="prevBtn" title="Verset précédent">⏮</button>
        <button class="btn-player play" id="playBtn" title="Lecture">▶</button>
        <button class="btn-player" id="nextBtn" title="Verset suivant">⏭</button>
      </div>
    </div>

    <div class="verse-container">
      <div id="verseContent">
        <div class="loading">
          <div class="spinner"></div>
          <p>Chargement du Qur'an...</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    let currentSurah = 1;
    let currentAyah = 1;
    let totalAyahs = 7;
    let isPlaying = false;
    let audio = new Audio();
    let surahsList = [];

    const surahSelect = document.getElementById('surahSelect');
    const reciterSelect = document.getElementById('reciterSelect');
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const verseContent = document.getElementById('verseContent');

    async function init() {
      await loadSurahs();
      await loadVerse();
    }

    async function loadSurahs() {
      try {
        const response = await fetch('https://api.alquran.cloud/v1/surah');
        const data = await response.json();
        
        if (data.code !== 200) throw new Error('Erreur API');
        
        surahsList = data.data;
        
        surahSelect.innerHTML = surahsList.map(surah => 
          `<option value="${surah.number}">${surah.number}. ${surah.englishName} - ${surah.name} (${surah.numberOfAyahs} versets)</option>`
        ).join('');
        
        surahSelect.value = currentSurah;
        
      } catch (err) {
        console.error('Erreur sourates:', err);
        surahSelect.innerHTML = '<option>❌ Erreur</option>';
      }
    }

    async function loadVerse() {
      try {
        verseContent.innerHTML = '<div class="loading"><div class="spinner"></div><p>Chargement...</p></div>';
        
        const translation = translationSelect.value;
        
        const response = await fetch(
          `https://api.alquran.cloud/v1/ayah/${currentSurah}:${currentAyah}/editions/quran-simple,${translation}`
        );
        
        const result = await response.json();
        
        if (result.code !== 200) throw new Error('Erreur API');
        
        const [arabic, translationData] = result.data;
        totalAyahs = arabic.surah.numberOfAyahs;
        
        let bismillahHTML = '';
        if (currentAyah === 1 && currentSurah !== 1 && currentSurah !== 9) {
          bismillahHTML = '<div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>';
        }
        
        verseContent.innerHTML = `
          <div class="verse-header">
            <h2>${arabic.surah.englishName} - ${arabic.surah.name}</h2>
            <p class="ayah-number">Verset ${arabic.numberInSurah} / ${totalAyahs}</p>
          </div>
          
          ${bismillahHTML}
          
          <div class="verse-arabic" id="verseArabic">${arabic.text}</div>
          
          <div class="verse-translation">${translationData.text}</div>
          
          <div class="verse-nav">
            <button class="btn-nav" id="prevVerseBtn" ${currentAyah === 1 ? 'disabled' : ''}>← Précédent</button>
            <button class="btn-nav" id="nextVerseBtn" ${currentAyah === totalAyahs ? 'disabled' : ''}>Suivant →</button>
          </div>
        `;
        
        document.getElementById('prevVerseBtn')?.addEventListener('click', prevVerse);
        document.getElementById('nextVerseBtn')?.addEventListener('click', nextVerse);
        
        loadAudio();
        
      } catch (err) {
        console.error('Erreur:', err);
        verseContent.innerHTML = '<div class="loading"><p style="color:#f44336;">❌ Erreur de chargement</p></div>';
      }
    }

    function loadAudio() {
      const reciter = reciterSelect.value;
      const surahPadded = String(currentSurah).padStart(3, '0');
      const ayahPadded = String(currentAyah).padStart(3, '0');
      
      audio.src = `https://cdn.islamic.network/quran/audio/128/${reciter}/${surahPadded}${ayahPadded}.mp3`;
      audio.load();
    }

    playBtn.addEventListener('click', () => {
      if (isPlaying) {
        audio.pause();
        playBtn.textContent = '▶';
        document.getElementById('verseArabic')?.classList.remove('playing');
      } else {
        audio.play();
        playBtn.textContent = '⏸';
        document.getElementById('verseArabic')?.classList.add('playing');
      }
      isPlaying = !isPlaying;
    });

    audio.addEventListener('ended', () => {
      playBtn.textContent = '▶';
      isPlaying = false;
      document.getElementById('verseArabic')?.classList.remove('playing');
      if (currentAyah < totalAyahs) {
        setTimeout(() => nextVerse(), 1000);
      }
    });

    audio.addEventListener('error', () => {
      console.error('Erreur audio');
      playBtn.textContent = '▶';
      isPlaying = false;
    });

    function nextVerse() {
      if (currentAyah < totalAyahs) {
        currentAyah++;
      } else if (currentSurah < 114) {
        currentSurah++;
        currentAyah = 1;
        surahSelect.value = currentSurah;
      }
      audio.pause();
      isPlaying = false;
      playBtn.textContent = '▶';
      loadVerse();
    }

    function prevVerse() {
      if (currentAyah > 1) {
        currentAyah--;
        audio.pause();
        isPlaying = false;
        playBtn.textContent = '▶';
        loadVerse();
      }
    }

    nextBtn.addEventListener('click', nextVerse);
    prevBtn.addEventListener('click', prevVerse);

    surahSelect.addEventListener('change', (e) => {
      currentSurah = parseInt(e.target.value);
      currentAyah = 1;
      audio.pause();
      isPlaying = false;
      playBtn.textContent = '▶';
      loadVerse();
    });

    reciterSelect.addEventListener('change', () => {
      audio.pause();
      isPlaying = false;
      playBtn.textContent = '▶';
      loadAudio();
    });

    translationSelect.addEventListener('change', () => {
      loadVerse();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') nextVerse();
      if (e.key === 'ArrowLeft') prevVerse();
      if (e.key === ' ') {
        e.preventDefault();
        playBtn.click();
      }
    });

    init();
  </script>

</body>
</html>
