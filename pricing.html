<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Abonnements — Muslimah Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --rose:#E8D7DF;
      --mauve:#C8B6D8;
      --beige:#F5EFE8;
      --cream:#FCFAF8;
      --gold:#C6A86B;
      --text:#2C2C2C;
      --shadow: 0 18px 45px rgba(0,0,0,.08);
      --shadow2: 0 10px 30px rgba(0,0,0,.06);
      --radius: 26px;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Montserrat',sans-serif;
      background:var(--cream);
      color:var(--text);
      line-height:1.6;
      padding-top:90px;
    }
    h1,h2,h3{font-family:'Playfair Display',serif}
    a{color:inherit}

    .navbar{
      position:fixed; top:0; left:0; right:0;
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 28px;
      background:rgba(255,255,255,.78);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(200,182,216,.35);
      z-index:999;
    }

    .logo{
      font-family:'Playfair Display',serif;
      font-size:22px;
      letter-spacing:.2px;
      color:var(--gold);
      display:flex; align-items:center; gap:10px;
      text-decoration:none;
    }
    .logo-badge{
      width:34px;height:34px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff, var(--beige));
      border: 1px solid rgba(198,168,107,.35);
      box-shadow: 0 8px 20px rgba(0,0,0,.06);
      position:relative;
    }
    .logo-badge::after{
      content:"";
      position:absolute; inset:8px;
      border-radius:50%;
      border: 1px dashed rgba(198,168,107,.55);
      opacity:.9;
    }

    .nav-links{
      list-style:none;
      display:flex;
      gap:18px;
      align-items:center;
    }
    .nav-links a{
      text-decoration:none;
      color:rgba(200,182,216,.95);
      font-weight:500;
      padding:10px 12px;
      border-radius:999px;
      transition:.25s;
    }
    .nav-links a:hover{
      background: rgba(232,215,223,.55);
      color:#8f77a9;
    }
    .nav-cta{
      background: rgba(200,182,216,.28);
      border: 1px solid rgba(200,182,216,.35);
      color:#8f77a9 !important;
    }
    .nav-cta:hover{ background: rgba(232,215,223,.55) !important; }

    @media (max-width: 900px){
      .nav-links{display:none;}
      body{padding-top:80px;}
    }

    main.page{width:min(980px,100%); margin:0 auto; padding:32px 18px;}
    .card{
      position: relative;
      z-index: 2;
      background:rgba(255,255,255,.85);
      border:1px solid rgba(200,182,216,.25);
      border-radius:26px;
      box-shadow:var(--shadow2);
      padding:18px;
    }
    .muted{color:rgba(44,44,44,.68);}
    .btn{
      position: relative;
      z-index: 3;
      pointer-events: auto;

      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      border-radius:999px;
      border:1px solid rgba(200,182,216,.35);
      text-decoration:none;
      font-weight:600;
      transition:.2s;
      box-shadow:var(--shadow2);
      cursor:pointer;
      background: transparent;
      font: inherit;
    }
    .btn:hover{transform:translateY(-2px); box-shadow:var(--shadow);}
    .btn.primary{background:rgba(232,215,223,.92); color:#fff; border-color:rgba(255,255,255,.6);}
    .btn.secondary{background:rgba(200,182,216,.92); color:#fff; border-color:rgba(255,255,255,.6);}
    .btn.ghost{background:rgba(255,255,255,.65); color:#8f77a9;}
    .stack{display:flex; flex-direction:column; gap:12px;}
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  </style>
</head>
<body>

<header class="navbar">
  <a class="logo" href="index.html"><span class="logo-badge"></span>Muslimah Society</a>
  <nav>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="library.html">Bibliothèque</a></li>
      <li><a href="audio.html">Audithèque</a></li>
      <li><a href="vip-events.html">Événements</a></li>
      <li><a href="pricing.html">Abonnements</a></li>
      <li><a href="dashboard.html">Espace membre</a></li>
      <li><a href="login.html" class="nav-cta">Connexion</a></li>
    </ul>
  </nav>
</header>

<main class="page">
  <section class="card stack">
    <h1 style="color:var(--gold); font-family:'Playfair Display',serif;">Abonnements</h1>
    <p class="muted">Member ou VIP. (Clique pour lancer Stripe Checkout.)</p>

    <div class="row">
      <button class="btn primary" id="btnMember" type="button">S’abonner (Member)</button>
      <button class="btn secondary" id="btnVIP" type="button">S’abonner (VIP)</button>
      <a class="btn ghost" href="dashboard.html">Espace membre</a>
    </div>

    <p class="muted" style="font-size:13px">
      Astuce : si tu n’es pas connectée, tu seras redirigée vers Connexion.
    </p>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/gate.js"></script>
  <script src="js/billing.js"></script>

  <script>
    (async () => {
      // 1) Vérifie connexion (redirige sinon)
      await requireAuth();

      // 2) Branche les boutons
      const m = document.getElementById("btnMember");
      const v = document.getElementById("btnVIP");

      m.addEventListener("click", () => checkout("member"));
      v.addEventListener("click", () => checkout("vip"));
    })();
  </script>
</main>

</body>
</html>
