<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connexion — Muslimah Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body{font-family:Montserrat,sans-serif;background:#FCFAF8;margin:0;display:grid;place-items:center;min-height:100vh}
    .box{width:min(420px,92vw);background:#fff;border-radius:22px;padding:26px;box-shadow:0 18px 45px rgba(0,0,0,.08)}
    h1{font-family:"Playfair Display",serif;margin:0 0 10px;color:#C6A86B}
    input{width:100%;padding:12px 14px;border-radius:999px;border:1px solid #ddd;margin:8px 0;outline:none}
    button,a{display:inline-flex;justify-content:center;align-items:center;padding:12px 18px;border-radius:999px;border:0;cursor:pointer;text-decoration:none;font-weight:500}
    .primary{background:#E8D7DF;color:#fff;width:100%}
    .link{margin-top:12px;display:block;text-align:center;color:#8f77a9}
  </style>
</head>
<body>
  <div class="box">
    <h1>Connexion</h1>
    <input id="email" type="email" placeholder="Email" />
    <input id="password" type="password" placeholder="Mot de passe" />
    <button class="primary" id="btn">Se connecter</button>
    <a class="link" href="register.html">Créer un compte</a>
    <a class="link" href="pricing.html">S’abonner</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("btn").addEventListener("click", async () => {
      try{
        await login(
          document.getElementById("email").value.trim(),
          document.getElementById("password").value
        );
        window.location.href = "dashboard.html";
      }catch(e){
        alert(e.message || "Erreur de connexion");
      }
    });
  </script>
</body>
</html>
