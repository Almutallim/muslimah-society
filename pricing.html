<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Abonnements — Muslimah Society</title>
  <style>
    body{font-family:system-ui,Segoe UI,Arial;background:#FCFAF8;margin:0;display:grid;place-items:center;min-height:100vh;padding:24px}
    .wrap{max-width:920px;width:100%}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px}
    .card{background:#fff;border-radius:22px;padding:18px;box-shadow:0 18px 45px rgba(0,0,0,.08)}
    h1{margin:0 0 14px}
    button{width:100%;padding:12px 16px;border-radius:999px;border:0;cursor:pointer;font-weight:700}
    .m{background:#E8D7DF;color:#fff}
    .v{background:#C8B6D8;color:#fff}
    .muted{color:#666}
    a{color:#8f77a9;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Choisir un abonnement</h1>
    <p class="muted">Connecte-toi avant de payer (pour lier l’abonnement à ton compte) → <a href="login.html">Connexion</a></p>

    <div class="grid">
      <div class="card">
        <h2>Member</h2>
        <p>Bibliothèque + Audithèque + Replays</p>
        <button class="m" onclick="checkout('member')">S’abonner (Member)</button>
      </div>

      <div class="card">
        <h2>VIP</h2>
        <p>Tout Member + Soirées privées + accès VIP</p>
        <button class="v" onclick="checkout('vip')">S’abonner (VIP)</button>
      </div>
    </div>

    <p style="margin-top:14px" class="muted">Après paiement → retour automatique sur le Dashboard.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/gate.js"></script>
  <script src="js/billing.js"></script>
  <script>
    requireAuth();
  </script>
</body>
</html>
