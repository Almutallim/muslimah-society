<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Inscription — Muslimah Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
:root{
      --rose:#E8D7DF;
      --mauve:#C8B6D8;
      --beige:#F5EFE8;
      --cream:#FCFAF8;
      --gold:#C6A86B;
      --text:#2C2C2C;
      --shadow: 0 18px 45px rgba(0,0,0,.08);
      --shadow2: 0 10px 30px rgba(0,0,0,.06);
      --radius: 26px;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Montserrat',sans-serif;
      background:var(--cream);
      color:var(--text);
      line-height:1.6;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    h1,h2,h3{font-family:'Playfair Display',serif}

    .register-container{
      width: min(520px, 100%);
      background: rgba(255,255,255,.90);
      border: 1px solid rgba(200,182,216,.25);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .register-header{
      background: var(--mauve);
      padding: 40px 30px;
      text-align: center;
      border-bottom: 1px solid rgba(200,182,216,.25);
    }
    .register-header .logo-badge{
      width:50px;height:50px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff, var(--beige));
      border: 1px solid rgba(198,168,107,.35);
      box-shadow: 0 8px 20px rgba(0,0,0,.06);
      position:relative;
      margin: 0 auto 16px;
    }
    .register-header .logo-badge::after{
      content:"";
      position:absolute; inset:10px;
      border-radius:50%;
      border: 1px dashed rgba(198,168,107,.55);
      opacity:.9;
    }
    .register-header h1{
      font-size: 2rem;
      color: #fff;
      margin-bottom: 8px;
    }
    .register-header p{
      color: rgba(255,255,255,.85);
      font-size: 0.95rem;
    }

    .register-body{
      padding: 40px 30px;
    }

    .form-group{
      margin-bottom: 18px;
    }
    .form-group label{
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
      font-size: 0.9rem;
    }
    .form-group input{
      width: 100%;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1px solid rgba(200,182,216,.35);
      background: rgba(255,255,255,.75);
      font-size: 15px;
      outline: none;
      transition: .2s;
    }
    .form-group input:focus{
      border-color: var(--mauve);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(200,182,216,.15);
    }

    .checkbox-group{
      margin: 20px 0;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .checkbox-group input[type="checkbox"]{
      width: auto;
      margin-top: 4px;
      cursor: pointer;
    }
    .checkbox-group label{
      font-weight: 400;
      font-size: 0.85rem;
      color: rgba(44,44,44,.72);
      cursor: pointer;
    }
    .checkbox-group label a{
      color: var(--mauve);
      text-decoration: none;
      font-weight: 600;
    }
    .checkbox-group label a:hover{
      text-decoration: underline;
    }

    .btn{
      width: 100%;
      padding: 14px 18px;
      border-radius: 999px;
      border: none;
      background: var(--rose);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: .25s;
      font-size: 15px;
      margin-top: 10px;
    }
    .btn:hover{
      background: var(--mauve);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: var(--shadow2);
    }

    .divider{
      text-align: center;
      margin: 25px 0;
      position: relative;
      color: rgba(44,44,44,.50);
      font-size: 0.9rem;
    }
    .divider::before,
    .divider::after{
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: rgba(200,182,216,.25);
    }
    .divider::before{left: 0;}
    .divider::after{right: 0;}

    .links{
      text-align: center;
      margin-top: 20px;
    }
    .links a{
      color: var(--mauve);
      text-decoration: none;
      font-weight: 600;
      transition: .2s;
    }
    .links a:hover{
      color: var(--gold);
      text-decoration: underline;
    }

    .back-home{
      text-align: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(200,182,216,.15);
    }
    .back-home a{
      color: rgba(44,44,44,.68);
      text-decoration: none;
      font-size: 0.9rem;
      transition: .2s;
    }
    .back-home a:hover{
      color: var(--gold);
    }

    .info-box{
      background: var(--beige);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: rgba(44,44,44,.72);
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="register-container">
    
    <div class="register-header">
      <div class="logo-badge"></div>
      <h1>Inscription</h1>
      <p>Rejoins Muslimah Society</p>
    </div>

    <div class="register-body">
      
      <div class="info-box">
        ✨ Crée ton compte pour accéder à la bibliothèque, l'audithèque et recevoir les invitations aux soirées VIP.
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label for="fullname">Prénom & Nom</label>
          <input type="text" id="fullname" placeholder="Fatima Zahra" required>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="ton@email.com" required>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="Minimum 8 caractères" minlength="8" required>
        </div>

        <div class="form-group">
          <label for="confirm">Confirmer le mot de passe</label>
          <input type="password" id="confirm" placeholder="••••••••" minlength="8" required>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="terms" required>
          <label for="terms">
            J'accepte les <a href="terms.html" target="_blank">conditions d'utilisation</a> 
            et la <a href="privacy.html" target="_blank">politique de confidentialité</a>
          </label>
        </div>

        <button type="submit" class="btn">Créer mon compte</button>
      </form>

      <div class="divider">ou</div>

      <div class="links">
        <p>
          Déjà membre ? <a href="login.html">Se connecter</a>
        </p>
      </div>

      <div class="back-home">
        <a href="index.html">← Retour à l'accueil</a>
      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("registerForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;
      
      if(password !== confirm){
        alert("Les mots de passe ne correspondent pas");
        return;
      }
      
      try{
        await signup(
          document.getElementById("email").value.trim(),
          password,
          document.getElementById("fullname").value.trim()
        );
        alert("Compte créé ! Vérifie ton email pour confirmer.");
        window.location.href = "login.html";
      }catch(err){ 
        alert(err.message || "Erreur lors de l'inscription"); 
      }
    });
  </script>

</body>
</html>
