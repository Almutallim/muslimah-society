<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connexion — Muslimah Society</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
:root{
      --rose:#E8D7DF;
      --mauve:#C8B6D8;
      --beige:#F5EFE8;
      --cream:#FCFAF8;
      --gold:#C6A86B;
      --text:#2C2C2C;
      --shadow: 0 18px 45px rgba(0,0,0,.08);
      --shadow2: 0 10px 30px rgba(0,0,0,.06);
      --radius: 26px;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Montserrat',sans-serif;
      background:var(--cream);
      color:var(--text);
      line-height:1.6;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    h1,h2,h3{font-family:'Playfair Display',serif}

    .login-container{
      width: min(480px, 100%);
      background: rgba(255,255,255,.90);
      border: 1px solid rgba(200,182,216,.25);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .login-header{
      background: var(--rose);
      padding: 40px 30px;
      text-align: center;
      border-bottom: 1px solid rgba(200,182,216,.25);
    }
    .login-header .logo-badge{
      width:50px;height:50px;border-radius:50%;
      background: radial-gradient(circle at 30% 30%, #fff, var(--beige));
      border: 1px solid rgba(198,168,107,.35);
      box-shadow: 0 8px 20px rgba(0,0,0,.06);
      position:relative;
      margin: 0 auto 16px;
    }
    .login-header .logo-badge::after{
      content:"";
      position:absolute; inset:10px;
      border-radius:50%;
      border: 1px dashed rgba(198,168,107,.55);
      opacity:.9;
    }
    .login-header h1{
      font-size: 2rem;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .login-header p{
      color: rgba(44,44,44,.68);
      font-size: 0.95rem;
    }

    .login-body{
      padding: 40px 30px;
    }

    .form-group{
      margin-bottom: 20px;
    }
    .form-group label{
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
      font-size: 0.9rem;
    }
    .form-group input{
      width: 100%;
      padding: 14px 18px;
      border-radius: 999px;
      border: 1px solid rgba(200,182,216,.35);
      background: rgba(255,255,255,.75);
      font-size: 15px;
      outline: none;
      transition: .2s;
    }
    .form-group input:focus{
      border-color: var(--mauve);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(200,182,216,.15);
    }

    .btn{
      width: 100%;
      padding: 14px 18px;
      border-radius: 999px;
      border: none;
      background: var(--mauve);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: .25s;
      font-size: 15px;
      margin-top: 10px;
    }
    .btn:hover{
      background: var(--rose);
      color: var(--text);
      transform: translateY(-2px);
      box-shadow: var(--shadow2);
    }

    .divider{
      text-align: center;
      margin: 30px 0;
      position: relative;
      color: rgba(44,44,44,.50);
      font-size: 0.9rem;
    }
    .divider::before,
    .divider::after{
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: rgba(200,182,216,.25);
    }
    .divider::before{left: 0;}
    .divider::after{right: 0;}

    .links{
      text-align: center;
      margin-top: 20px;
    }
    .links a{
      color: var(--mauve);
      text-decoration: none;
      font-weight: 600;
      transition: .2s;
    }
    .links a:hover{
      color: var(--gold);
      text-decoration: underline;
    }

    .back-home{
      text-align: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(200,182,216,.15);
    }
    .back-home a{
      color: rgba(44,44,44,.68);
      text-decoration: none;
      font-size: 0.9rem;
      transition: .2s;
    }
    .back-home a:hover{
      color: var(--gold);
    }
  </style>
</head>
<body>

  <div class="login-container">
    
    <div class="login-header">
      <div class="logo-badge"></div>
      <h1>Connexion</h1>
      <p>Accède à ton espace membre</p>
    </div>

    <div class="login-body">
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="ton@email.com" required>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn">Se connecter</button>
      </form>

      <div class="divider">ou</div>

      <div class="links">
        <p style="margin-bottom: 12px;">
          <a href="#">Mot de passe oublié ?</a>
        </p>
        <p>
          Pas encore membre ? <a href="register.html">Créer un compte</a>
        </p>
      </div>

      <div class="back-home">
        <a href="index.html">← Retour à l'accueil</a>
      </div>

    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      try{
        await login(
          document.getElementById("email").value.trim(), 
          document.getElementById("password").value
        );
        window.location.href = "dashboard.html";
      }catch(err){ 
        alert(err.message || "Erreur de connexion"); 
      }
    });
  </script>

</body>
</html>
