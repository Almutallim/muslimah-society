<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Admin Dashboard — Muslimah Society</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--rose:#E8D7DF;--mauve:#C8B6D8;--beige:#F5EFE8;--cream:#FCFAF8;--gold:#C6A86B;--text:#2C2C2C;--shadow: 0 18px 45px rgba(0,0,0,.08);--shadow2: 0 10px 30px rgba(0,0,0,.06);--radius: 26px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',sans-serif;background:var(--cream);color:var(--text);line-height:1.7;padding-top:90px}
h1,h2,h3{font-family:'Playfair Display',serif}
.navbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:18px 28px;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-bottom:1px solid rgba(200,182,216,.35);z-index:999}
.logo{font-family:'Playfair Display',serif;font-size:22px;letter-spacing:.2px;color:var(--gold);display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-badge{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #fff, var(--beige));border:1px solid rgba(198,168,107,.35);box-shadow:0 8px 20px rgba(0,0,0,.06);position:relative}
.logo-badge::after{content:"";position:absolute;inset:8px;border-radius:50%;border:1px dashed rgba(198,168,107,.55)}
.container{max-width:1200px;margin:0 auto;padding:40px 20px}
.header{text-align:center;margin-bottom:40px}
.header h1{font-size:clamp(32px, 4vw, 48px);color:var(--gold);margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:30px}
.stat-card{background:rgba(255,255,255,.90);border:2px solid rgba(200,182,216,.30);border-radius:20px;padding:25px;text-align:center;box-shadow:var(--shadow2)}
.stat-value{font-size:42px;color:var(--gold);font-weight:700;margin-bottom:8px}
.stat-label{font-size:13px;color:rgba(44,44,44,.65);text-transform:uppercase;letter-spacing:1px}
.actions-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;margin-bottom:30px}
.action-card{background:linear-gradient(135deg,var(--rose),var(--mauve));color:#fff;border-radius:20px;padding:30px;text-align:center;text-decoration:none;display:block;transition:.3s;box-shadow:var(--shadow2)}
.action-card:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.action-card h3{margin:15px 0}
.card{background:rgba(255,255,255,.90);border:2px solid rgba(200,182,216,.30);border-radius:var(--radius);padding:30px;margin-bottom:25px;box-shadow:var(--shadow2)}
</style>
</head>
<body>
<header class="navbar">
<a class="logo" href="index.html"><span class="logo-badge"></span>Muslimah Society</a>
</header>
<div class="container">
<div class="header">
<h1>👑 Admin Dashboard</h1>
<p>Gestion de la plateforme Muslimah Society</p>
</div>
<div class="stats-grid" id="stats">
<div class="stat-card">
<div class="stat-value">...</div>
<div class="stat-label">Members Actifs</div>
</div>
<div class="stat-card">
<div class="stat-value">...</div>
<div class="stat-label">VIP Actifs</div>
</div>
<div class="stat-card">
<div class="stat-value">...</div>
<div class="stat-label">Revenus Mois</div>
</div>
<div class="stat-card">
<div class="stat-value">...</div>
<div class="stat-label">Nouveaux 7j</div>
</div>
</div>
<h2 style="color:var(--gold);margin-bottom:20px">Actions Rapides</h2>
<div class="actions-grid">
<a href="admin-users.html" class="action-card">
<div style="font-size:42px">👥</div>
<h3>Gérer Utilisateurs</h3>
</a>
<a href="library.html" class="action-card">
<div style="font-size:42px">📚</div>
<h3>Upload PDF</h3>
</a>
<a href="audio.html" class="action-card">
<div style="font-size:42px">🎵</div>
<h3>Upload Audio</h3>
</a>
<a href="vip-events.html" class="action-card">
<div style="font-size:42px">🌹</div>
<h3>Créer Événement</h3>
</a>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/gate-admin.js"></script>
<script>
requireAdmin();
async function loadStats(){
try{
const {data:profiles}=await supabaseClient.from('profiles').select('*');
const members=profiles?.filter(p=>p.subscription_tier==='member'&&p.subscription_status==='active').length||0;
const vip=profiles?.filter(p=>p.subscription_tier==='vip'&&p.subscription_status==='active').length||0;
const revenue=(members*12.99+vip*39.99).toFixed(2);
const sevenDaysAgo=new Date();sevenDaysAgo.setDate(sevenDaysAgo.getDate()-7);
const newUsers=profiles?.filter(p=>new Date(p.created_at)>sevenDaysAgo).length||0;
document.getElementById('stats').innerHTML=`
<div class="stat-card"><div class="stat-value">${members}</div><div class="stat-label">Members Actifs</div></div>
<div class="stat-card"><div class="stat-value">${vip}</div><div class="stat-label">VIP Actifs</div></div>
<div class="stat-card"><div class="stat-value">${revenue}€</div><div class="stat-label">Revenus Mois</div></div>
<div class="stat-card"><div class="stat-value">${newUsers}</div><div class="stat-label">Nouveaux 7j</div></div>
`;
}catch(e){console.error(e)}
}
loadStats();
</script>
</body>
</html>
